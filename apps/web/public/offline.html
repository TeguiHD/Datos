<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Sin conexión · datos.nicoholas.dev</title>
    <meta name="theme-color" content="#0f172a" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        font: 500 16px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 24px;
        text-align: center;
      }
      main { max-width: 28rem; }
      h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
      p { color: #94a3b8; margin: 0 0 1.25rem; }
      button {
        appearance: none;
        border: 1px solid #334155;
        background: #1e293b;
        color: #f1f5f9;
        font: inherit;
        padding: 0.75rem 1.25rem;
        border-radius: 0.75rem;
        cursor: pointer;
        min-height: 44px;
      }
      button:focus-visible { outline: 2px solid #38bdf8; outline-offset: 2px; }
      .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; margin-right: 6px; vertical-align: middle; }
    </style>
  </head>
  <body>
    <main>
      <p><span class="dot"></span>Modo offline</p>
      <h1>Sin conexión</h1>
      <p>No se pudo cargar esta vista porque no hay red disponible. Los cambios marcados en campo se sincronizarán automáticamente cuando vuelva la conexión.</p>
      <button type="button" onclick="location.reload()">Reintentar</button>
    </main>
  </body>
</html>
