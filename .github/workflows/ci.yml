name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: datos
          POSTGRES_PASSWORD: datos
          POSTGRES_DB: datos
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U datos" --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://datos:datos@localhost:5432/datos?schema=public
      PASSWORD_PEPPER: ci-pepper
      KEK_BASE64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      JWT_SECRET: ci-jwt
      COOKIE_SECRET: ci-cookie
      CSRF_SECRET: ci-csrf
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @datos/api prisma generate
      - run: pnpm --filter @datos/api prisma migrate deploy
      - run: pnpm -r typecheck
      - run: pnpm -r test

  codeql:
    uses: github/codeql-action/.github/workflows/codeql.yml@main
    with:
      languages: javascript-typescript

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm audit --prod || true
