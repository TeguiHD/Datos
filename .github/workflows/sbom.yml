name: SBOM

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Generate SBOM
        run: npx --yes @cyclonedx/cdxgen@latest -t pnpm -o sbom.json -r
      - uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90
