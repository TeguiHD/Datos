name: datos

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ${DATOS_ENV_FILE:-../.env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt: [no-new-privileges:true]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redisdata:/data
    networks: [internal]
    security_opt: [no-new-privileges:true]

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: ${DATOS_ENV_FILE:-../.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      evidence-init:
        condition: service_completed_successfully
    networks: [internal]
    security_opt: [no-new-privileges:true]
    read_only: true
    volumes:
      - evidencedata:/var/lib/datos/evidencias
    tmpfs:
      - /tmp
    cap_drop: [ALL]

  evidence-init:
    image: alpine:3.20
    command: ["sh", "-lc", "mkdir -p /var/lib/datos/evidencias && chown -R 1000:1000 /var/lib/datos/evidencias && chmod 700 /var/lib/datos/evidencias"]
    volumes:
      - evidencedata:/var/lib/datos/evidencias
    network_mode: none
    security_opt: [no-new-privileges:true]
    restart: "no"

  ops:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file: ${DATOS_ENV_FILE:-../.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [internal]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    restart: "no"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://datos.nicoholas.dev}
    restart: unless-stopped
    env_file: ${DATOS_ENV_FILE:-../.env}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://datos.nicoholas.dev}
      PORT: "3000"
    depends_on: [api]
    networks: [internal]
    security_opt: [no-new-privileges:true]

  caddy:
    build:
      context: .
      dockerfile: Caddy.Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    env_file: ${DATOS_ENV_FILE:-../.env}
    depends_on: [web, api]
    networks: [internal, edge]

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
  evidencedata:

networks:
  internal:
    driver: bridge
  edge:
    driver: bridge
